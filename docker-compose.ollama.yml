version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: sow-ollama
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - sow-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

volumes:
  ollama_data:

networks:
  sow-internal:
    external: true
    name: sow-to-jira-network
