name: user-stack

services:
  app:
    image: ghcr.io/magggiiii/sow_2_jira:${S2J_VERSION:-latest}
    container_name: s2j-user-app
    init: true
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
    env_file: .env
    environment:
      - SOW_DATA_DIR=/app/data
      - PYTHONUNBUFFERED=1
      - ARGUS_COLLECTOR_URL=http://argus-collector:4317
      - DOCKER_HOST_INTERNAL=${DOCKER_HOST_INTERNAL:-host.docker.internal}
    depends_on:
      - bifrost
    networks:
      - sow-internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/status').read()\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  argus-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: s2j-user-argus-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./config/user/argus-collector-edge.yaml:/etc/otel-collector-config.yaml:ro
      - ./data:/app/data
    environment:
      - ARGUS_HQ_URL=${ARGUS_HQ_URL}
      - ARGUS_BACKBONE_TOKEN=${ARGUS_BACKBONE_TOKEN}
    networks:
      - sow-internal
    restart: unless-stopped

  bifrost:
    image: maximhq/bifrost:latest
    container_name: s2j-user-bifrost
    volumes:
      - ./data:/app/data
    environment:
      - LOKI_URL=http://loki:3100
      - TEMPO_URL=http://tempo:4317
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
    networks:
      - sow-internal
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  loki:
    image: grafana/loki:2.9.4
    container_name: s2j-user-loki
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - sow-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  tempo:
    image: grafana/tempo:2.3.1
    container_name: s2j-user-tempo
    command: [ "-config.file=/etc/tempo.yaml" ]
    volumes:
      - ./config/user/tempo.yaml:/etc/tempo.yaml
    networks:
      - sow-internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:10.2.3
    container_name: s2j-user-grafana
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    networks:
      - sow-internal

networks:
  sow-internal:
    name: user-network
